<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K&D Check-In Responses</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:720px;margin:0 auto}
.lock{display:flex;align-items:center;justify-content:center;min-height:80vh}
.lock-card{background:#fff;border:1px solid #e8e8e5;border-radius:14px;padding:2rem;width:100%;max-width:360px;text-align:center}
.lock-icon{width:48px;height:48px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem}
.lock-title{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:.5rem}
.lock-sub{font-size:14px;color:#888;margin-bottom:1.25rem}
input[type=password]{width:100%;font-size:18px;padding:.8rem;border:1px solid #ddd;border-radius:8px;background:#fafaf8;color:#1a1a1a;font-family:inherit;text-align:center;letter-spacing:.2em;transition:border-color .15s}
input[type=password]:focus{outline:none;border-color:#7A9B49;background:#fff}
.err-msg{font-size:13px;color:#c0392b;margin-top:.75rem;min-height:18px}
.btn-p{width:100%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;padding:11px 20px;background:#7A9B49;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:1rem;transition:background .15s}
.btn-p:hover{background:#546121}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem}
.logo-mark{display:inline-block;background:#7A9B49;color:#fff;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border-radius:6px}
.title{font-size:22px;font-weight:700;color:#1a1a1a}
.count{font-size:14px;color:#888;margin-top:2px}
.btn-refresh{font-size:13px;padding:8px 14px;background:#fff;border:1px solid #ddd;border-radius:8px;cursor:pointer;color:#444}
.btn-refresh:hover{background:#f0f0ec}
.response-card{background:#fff;border:1px solid #e8e8e5;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.response-meta{font-size:13px;color:#7A9B49;font-weight:700;margin-bottom:1.25rem}
.response-time{font-size:11px;color:#bbb;font-weight:400;margin-left:8px}
.qa-block{margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid #f0f0ec}
.qa-block:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.q{font-size:12px;color:#888;margin-bottom:4px;font-weight:500}
.a{font-size:15px;color:#1a1a1a;line-height:1.55}
.fq{font-size:12px;color:#7A9B49;margin:10px 0 4px;font-weight:500}
.fa{font-size:15px;color:#1a1a1a;line-height:1.55}
.section-div{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7A9B49;margin:1.25rem 0 1rem;padding-bottom:.4rem;border-bottom:2px solid #EAF3DE}
.empty{text-align:center;padding:3rem;color:#aaa;font-size:15px}
.loading{text-align:center;padding:3rem;color:#aaa;font-size:15px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SUPABASE_URL = "https://rlhfofdsdpsiavikuxhd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsaGZvZmRzZHBzaWF2aWt1eGhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NzgxOTcsImV4cCI6MjA5NTA1NDE5N30.yq77u8dHlTEqhbt3RI2QkRtGHoSlfP1DB1V0vfsMXIE";
const PIN = "1986";

const QUESTIONS = [
  "What's one thing that's working well in your day to day right now?",
  "What's one thing holding the team back that we're not talking about?",
  "What would winning look like to you in this role a year from now?",
  "What's one thing that would make you more bought in to where we're headed?",
  "What are you hoping to get from the planning session?",
  "What's one thing you would like to walk away with?",
  "What's one thing you need from your department leader to be successful?"
];

let unlocked = false;

function renderLock(err) {
  document.getElementById("root").innerHTML = `
    <div class="lock">
      <div class="lock-card">
        <div class="lock-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <div class="lock-title">Brian only</div>
        <div class="lock-sub">Enter your PIN to view responses</div>
        <input type="password" id="pin-input" placeholder="••••" maxlength="4"
          onkeydown="if(event.key==='Enter')checkPin()"
          oninput="document.getElementById('pin-err').textContent=''"/>
        <div class="err-msg" id="pin-err">${err||""}</div>
        <button class="btn-p" onclick="checkPin()">View responses &#8594;</button>
      </div>
    </div>`;
  setTimeout(() => { const e = document.getElementById("pin-input"); if(e) e.focus(); }, 50);
}

function checkPin() {
  const val = document.getElementById("pin-input").value;
  if (val === PIN) {
    unlocked = true;
    renderDashboard();
  } else {
    document.getElementById("pin-err").textContent = "Incorrect PIN. Try again.";
    document.getElementById("pin-input").value = "";
    document.getElementById("pin-input").focus();
  }
}

function renderDashboard() {
  document.getElementById("root").innerHTML = `
    <div class="wrap">
      <div class="header">
        <div>
          <span class="logo-mark">K&D Commercial</span>
          <div class="title" style="margin-top:.75rem">Team Check-In Responses</div>
          <div class="count" id="count">Loading...</div>
        </div>
        <button class="btn-refresh" onclick="load()">&#8635; Refresh</button>
      </div>
      <div id="responses"><div class="loading">Loading responses...</div></div>
    </div>`;
  load();
}

async function load() {
  if (!unlocked) return;
  document.getElementById("responses").innerHTML = '<div class="loading">Loading...</div>';
  document.getElementById("count").textContent = "Loading...";
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/team_checkin?select=*&order=submitted_at.desc`, {
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    if (!data || !data.length) {
      document.getElementById("responses").innerHTML = '<div class="empty">No responses yet.</div>';
      document.getElementById("count").textContent = "0 responses";
      return;
    }
    document.getElementById("count").textContent = `${data.length} response${data.length !== 1 ? "s" : ""}`;
    document.getElementById("responses").innerHTML = data.map((r, idx) => {
      const date = new Date(r.submitted_at).toLocaleDateString("en-US", {month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
      const displayName = `Response ${data.length - idx}`;
      return `
        <div class="response-card">
          <div class="response-meta">${displayName}<span class="response-time">${date}</span></div>
          <div class="section-div">Team + Division</div>
          ${[1,2,3,4].map(n => `
            <div class="qa-block">
              <div class="q">${QUESTIONS[n-1]}</div>
              <div class="a">${r['q'+n] || '<em style="color:#ccc">No answer</em>'}</div>
              ${r['q'+n+'_followup'] ? `<div class="fq">&#8627; ${r['q'+n+'_followup']}</div><div class="fa">${r['q'+n+'_followup_answer'] || '<em style="color:#ccc">No answer</em>'}</div>` : ''}
            </div>`).join("")}
          <div class="section-div">Planning Session</div>
          ${[5,6].map(n => `
            <div class="qa-block">
              <div class="q">${QUESTIONS[n-1]}</div>
              <div class="a">${r['q'+n] || '<em style="color:#ccc">No answer</em>'}</div>
              ${r['q'+n+'_followup'] ? `<div class="fq">&#8627; ${r['q'+n+'_followup']}</div><div class="fa">${r['q'+n+'_followup_answer'] || '<em style="color:#ccc">No answer</em>'}</div>` : ''}
            </div>`).join("")}
          <div class="section-div">Leadership</div>
          <div class="qa-block">
            <div class="q">${QUESTIONS[6]}</div>
            <div class="a">${r['q7'] || '<em style="color:#ccc">No answer</em>'}</div>
            ${r['q7_followup'] ? `<div class="fq">&#8627; ${r['q7_followup']}</div><div class="fa">${r['q7_followup_answer'] || '<em style="color:#ccc">No answer</em>'}</div>` : ''}
          </div>
        </div>`;
    }).join("");
  } catch(e) {
    document.getElementById("responses").innerHTML = '<div class="empty">Error loading. Try refreshing.</div>';
  }
}

renderLock();
</script>
</body>
</html>
