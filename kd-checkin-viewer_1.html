<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K&D Check-In Responses</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:720px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem}
.logo-mark{display:inline-block;background:#7A9B49;color:#fff;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border-radius:6px}
.title{font-size:22px;font-weight:700;color:#1a1a1a}
.count{font-size:14px;color:#888;margin-top:2px}
.btn-refresh{font-size:13px;padding:8px 14px;background:#fff;border:1px solid #ddd;border-radius:8px;cursor:pointer;color:#444}
.btn-refresh:hover{background:#f0f0ec}
.response-card{background:#fff;border:1px solid #e8e8e5;border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.response-meta{font-size:11px;color:#bbb;margin-bottom:1.25rem;text-transform:uppercase;letter-spacing:.06em}
.qa-block{margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid #f0f0ec}
.qa-block:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.q{font-size:12px;color:#888;margin-bottom:4px;font-weight:500}
.a{font-size:15px;color:#1a1a1a;line-height:1.55}
.fq{font-size:12px;color:#7A9B49;margin:10px 0 4px;font-weight:500}
.fa{font-size:15px;color:#1a1a1a;line-height:1.55}
.empty{text-align:center;padding:3rem;color:#aaa;font-size:15px}
.loading{text-align:center;padding:3rem;color:#aaa;font-size:15px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <span class="logo-mark">K&D Commercial</span>
      <div class="title" style="margin-top:.75rem">Team Check-In Responses</div>
      <div class="count" id="count">Loading...</div>
    </div>
    <button class="btn-refresh" onclick="load()">&#8635; Refresh</button>
  </div>
  <div id="responses"><div class="loading">Loading responses...</div></div>
</div>
<script>
const SUPABASE_URL = "https://rlhfofdsdpsiavikuxhd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsaGZvZmRzZHBzaWF2aWt1eGhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NzgxOTcsImV4cCI6MjA5NTA1NDE5N30.yq77u8dHlTEqhbt3RI2QkRtGHoSlfP1DB1V0vfsMXIE";

const QUESTIONS = [
  "What's one thing that's working well on your projects right now?",
  "What's one thing holding the team back that we're not talking about?",
  "What would winning look like to you in this role a year from now?",
  "What's one thing that would make you more bought in to where we're headed?"
];

async function load() {
  document.getElementById("responses").innerHTML = '<div class="loading">Loading...</div>';
  document.getElementById("count").textContent = "Loading...";
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/team_checkin?select=*&order=submitted_at.desc`, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`
      }
    });
    const data = await res.json();
    if (!data.length) {
      document.getElementById("responses").innerHTML = '<div class="empty">No responses yet.</div>';
      document.getElementById("count").textContent = "0 responses";
      return;
    }
    document.getElementById("count").textContent = `${data.length} response${data.length !== 1 ? "s" : ""}`;
    document.getElementById("responses").innerHTML = data.map((r, idx) => {
      const date = new Date(r.submitted_at).toLocaleDateString("en-US", {month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
      return `
        <div class="response-card">
          <div class="response-meta">Response ${data.length - idx} &nbsp;&middot;&nbsp; ${date}</div>
          ${[1,2,3,4].map(n => `
            <div class="qa-block">
              <div class="q">${QUESTIONS[n-1]}</div>
              <div class="a">${r['q'+n] || '<em style="color:#ccc">No answer</em>'}</div>
              <div class="fq">&#8627; ${r['q'+n+'_followup'] || ""}</div>
              <div class="fa">${r['q'+n+'_followup_answer'] || '<em style="color:#ccc">No answer</em>'}</div>
            </div>`).join("")}
        </div>`;
    }).join("");
  } catch(e) {
    document.getElementById("responses").innerHTML = '<div class="empty">Error loading responses. Try refreshing.</div>';
  }
}

load();
</script>
</body>
</html>
