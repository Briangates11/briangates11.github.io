<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K&D Commercial — Team Check-In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .wrap { width: 100%; max-width: 580px; }
  .logo { text-align: center; margin-bottom: 1.75rem; }
  .logo-mark { display: inline-block; background: #7A9B49; color: #fff; font-size: 13px; font-weight: 600; letter-spacing: .08em; padding: 6px 14px; border-radius: 6px; }
  .card { background: #fff; border: 1px solid #e8e8e5; border-radius: 14px; padding: 2rem; }
  .tag { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #999; margin-bottom: .5rem; }
  .accent { width: 32px; height: 3px; background: #7A9B49; border-radius: 2px; margin-bottom: 1.25rem; }
  .q-text { font-size: 20px; font-weight: 600; color: #1a1a1a; line-height: 1.35; margin-bottom: 1.25rem; }
  p.sub { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 1.25rem; }
  .q-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.75rem; }
  .q-row { display: flex; gap: 12px; align-items: flex-start; }
  .q-num { font-size: 12px; color: #7A9B49; font-weight: 700; margin-top: 2px; flex-shrink: 0; }
  .q-label { font-size: 14px; color: #555; line-height: 1.5; }
  textarea { width: 100%; min-height: 110px; font-size: 15px; padding: .8rem; border: 1px solid #ddd; border-radius: 8px; background: #fafaf8; color: #1a1a1a; resize: vertical; font-family: inherit; line-height: 1.6; transition: border-color .15s; }
  textarea:focus { outline: none; border-color: #7A9B49; background: #fff; }
  .followup-box { background: #EAF3DE; border-radius: 8px; padding: 1rem 1.25rem; margin: 1.25rem 0 1rem; }
  .followup-label { font-size: 11px; font-weight: 700; color: #3B6D11; text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
  .followup-q { font-size: 15px; color: #27500A; line-height: 1.5; }
  .btn-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: 1.25rem; }
  .btn-primary { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; padding: 11px 20px; background: #7A9B49; color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: background .15s; }
  .btn-primary:hover { background: #546121; }
  .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
  .btn-sec { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; padding: 11px 18px; background: transparent; color: #444; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: background .15s; }
  .btn-sec:hover { background: #f5f5f3; }
  .progress { display: flex; gap: 6px; margin-bottom: 1.5rem; }
  .pip { height: 4px; border-radius: 2px; flex: 1; background: #e0e0db; }
  .pip.done { background: #7A9B49; }
  .pip.active { background: #7A9B49; opacity: .5; }
  .loading { font-size: 14px; color: #888; padding: .6rem 0; display: flex; align-items: center; gap: 8px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #7A9B49; animation: pulse 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,100%{opacity:.25}50%{opacity:1} }
  .summary-item { padding: .8rem 0; border-bottom: 1px solid #f0f0ec; }
  .summary-item:last-child { border-bottom: none; }
  .summary-q { font-size: 12px; color: #999; margin-bottom: 4px; }
  .summary-a { font-size: 14px; color: #1a1a1a; line-height: 1.5; }
  .summary-wrap { border: 1px solid #e8e8e5; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
  .copy-area { width: 100%; min-height: 160px; font-size: 13px; padding: .75rem; border: 1px solid #e0e0db; border-radius: 8px; background: #fafaf8; color: #444; resize: none; font-family: monospace; line-height: 1.6; margin-top: 1rem; }
  .anon-note { font-size: 12px; color: #aaa; text-align: center; margin-top: 1.25rem; }
  .done-icon { width: 44px; height: 44px; background: #EAF3DE; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
  .done-icon svg { width: 22px; height: 22px; stroke: #3B6D11; stroke-width: 2.5; fill: none; }
  @media(max-width:480px){
    body { padding: 1rem .75rem; }
    .card { padding: 1.5rem; }
    .q-text { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><span class="logo-mark">K&D Commercial</span></div>
  <div id="app"></div>
  <p class="anon-note">Your responses are anonymous and go directly to leadership.</p>
</div>

<script>
const QUESTIONS = [
  "What's one thing that's working well on your projects right now?",
  "What's one thing holding the team back that we're not talking about?",
  "What would winning look like to you in this role a year from now?",
  "What's one thing that would make you more bought in to where we're headed?"
];

const BRIAN_EMAIL = "brian@kndlandscaping.com";

let state = {
  step: 0,
  phase: "intro",
  answers: [],
  followups: [],
  followupAnswers: [],
  currentFollowup: "",
  loadingFollowup: false
};

function render() {
  const app = document.getElementById("app");
  if (state.phase === "intro") {
    app.innerHTML = `
      <div class="card">
        <div class="tag">Team Check-In</div>
        <div class="accent"></div>
        <div class="q-text">We want to hear from you.</div>
        <p class="sub">Four questions. Completely anonymous. Takes about 5 minutes. Your answers go directly to Brian with no name attached.</p>
        <div class="q-list">
          ${QUESTIONS.map((q,i) => `<div class="q-row"><span class="q-num">${i+1}</span><span class="q-label">${q}</span></div>`).join("")}
        </div>
        <button class="btn-primary" onclick="startInterview()">Start &#8594;</button>
      </div>`;
  } else if (state.phase === "question") {
    const i = state.step;
    const hasPrimary = (state.answers[i] || "").trim().length > 0;
    const hasFollowup = state.currentFollowup && !state.loadingFollowup;
    const hasFollowupAnswer = (state.followupAnswers[i] || "").trim().length > 0;
    app.innerHTML = `
      <div class="progress">${QUESTIONS.map((_,j) => `<div class="pip ${j < i ? 'done' : j === i ? 'active' : ''}"></div>`).join("")}</div>
      <div class="card">
        <div class="tag">Question ${i+1} of ${QUESTIONS.length}</div>
        <div class="accent"></div>
        <div class="q-text">${QUESTIONS[i]}</div>
        <textarea id="primary-ans" placeholder="Type your answer here..." oninput="saveAnswer(this.value)">${state.answers[i] || ""}</textarea>
        ${state.loadingFollowup ? `<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>One follow-up coming...</span></div>` : ""}
        ${hasFollowup ? `
          <div class="followup-box">
            <div class="followup-label">Follow-up</div>
            <div class="followup-q">${state.currentFollowup}</div>
          </div>
          <textarea id="followup-ans" placeholder="Your answer..." oninput="saveFollowupAnswer(this.value)">${state.followupAnswers[i] || ""}</textarea>
        ` : ""}
        <div class="btn-row">
          ${!state.currentFollowup && !state.loadingFollowup ? `<button class="btn-primary" ${!hasPrimary ? "disabled" : ""} onclick="getFollowup()">Next &#8594;</button>` : ""}
          ${hasFollowup ? `<button class="btn-primary" ${!hasFollowupAnswer ? "disabled" : ""} onclick="nextQuestion()">Continue &#8594;</button>` : ""}
          ${i > 0 && !state.loadingFollowup ? `<button class="btn-sec" onclick="prevQuestion()">&#8592; Back</button>` : ""}
        </div>
      </div>`;
  } else if (state.phase === "done") {
    const emailBody = buildEmailBody();
    app.innerHTML = `
      <div class="card">
        <div class="done-icon"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
        <div class="tag">Complete</div>
        <div class="accent"></div>
        <div class="q-text">You're done. Thank you.</div>
        <p class="sub">Your responses are summarized below. Hit "Open email" to send them directly to Brian, or copy the text and paste it yourself.</p>
        <div class="summary-wrap">
          ${QUESTIONS.map((q,i) => `
            <div class="summary-item">
              <div class="summary-q">${q}</div>
              <div class="summary-a">${state.answers[i] || ""}</div>
              ${state.followups[i] ? `<div class="summary-q" style="margin-top:8px">${state.followups[i]}</div><div class="summary-a">${state.followupAnswers[i] || ""}</div>` : ""}
            </div>`).join("")}
        </div>
        <textarea class="copy-area" id="copy-body" readonly>${emailBody}</textarea>
        <div class="btn-row">
          <button class="btn-primary" onclick="openEmail()">&#9993; Open email</button>
          <button class="btn-sec" onclick="copyText()" id="copy-btn">Copy text</button>
        </div>
      </div>`;
  }
}

function startInterview() { state.phase = "question"; state.step = 0; render(); }
function saveAnswer(v) { state.answers[state.step] = v; }
function saveFollowupAnswer(v) { state.followupAnswers[state.step] = v; }

async function getFollowup() {
  const ans = (state.answers[state.step] || "").trim();
  if (!ans) return;
  state.loadingFollowup = true;
  render();
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: "You are helping a landscaping company leader get honest, specific feedback from their field crew and project team. Generate ONE short follow-up question (max 15 words) that digs deeper into the person's answer. Be direct and conversational. Return only the question, nothing else.",
        messages: [{ role: "user", content: `Original question: "${QUESTIONS[state.step]}"\nTheir answer: "${ans}"\n\nGenerate one follow-up question.` }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b => b.type === "text")?.text || "";
    state.currentFollowup = text.trim();
    state.followups[state.step] = state.currentFollowup;
  } catch(e) {
    state.currentFollowup = "Can you give a specific example of that?";
    state.followups[state.step] = state.currentFollowup;
  }
  state.loadingFollowup = false;
  render();
}

function nextQuestion() {
  if (state.step < QUESTIONS.length - 1) {
    state.step++;
    state.currentFollowup = state.followups[state.step] || "";
    state.loadingFollowup = false;
    render();
  } else {
    state.phase = "done";
    render();
  }
}

function prevQuestion() {
  if (state.step > 0) {
    state.step--;
    state.currentFollowup = state.followups[state.step] || "";
    state.loadingFollowup = false;
    render();
  }
}

function buildEmailBody() {
  let body = "K&D Commercial — Team Check-In (Anonymous)\n";
  body += "=".repeat(44) + "\n\n";
  QUESTIONS.forEach((q, i) => {
    body += `Q: ${q}\nA: ${state.answers[i] || ""}\n`;
    if (state.followups[i]) {
      body += `\nFollow-up: ${state.followups[i]}\nA: ${state.followupAnswers[i] || ""}\n`;
    }
    body += "\n";
  });
  return body.trim();
}

function openEmail() {
  const body = encodeURIComponent(buildEmailBody());
  const subject = encodeURIComponent("Team Check-In — Anonymous Responses");
  window.location.href = `mailto:${BRIAN_EMAIL}?subject=${subject}&body=${body}`;
}

function copyText() {
  const el = document.getElementById("copy-body");
  el.select();
  document.execCommand("copy");
  const btn = document.getElementById("copy-btn");
  if (btn) { btn.textContent = "Copied!"; setTimeout(() => { btn.textContent = "Copy text"; }, 2000); }
}

render();
</script>
</body>
</html>
